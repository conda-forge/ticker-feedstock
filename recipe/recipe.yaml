schema_version: 1

context:
  version: "5.2.1"

package:
  name: ticker
  version: ${{ version }}

source:
  url: https://github.com/achannarasappa/ticker/archive/v${{ version }}.tar.gz
  sha256: 774b060941aed0773b49633bb5b009247ff8122ee7d45ddfe406940c635f6926

build:
  number: 0

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - ticker --help

about:
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Terminal stock ticker with live updates and position tracking
  homepage: https://github.com/achannarasappa/ticker
  repository: https://github.com/achannarasappa/ticker

extra:
  recipe-maintainers:
    - danielnachun
